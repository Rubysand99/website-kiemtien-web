<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px #00ffcc;
text-align:center;
width:300px;
}

h2{
color:#00ffcc;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
margin:5px;
background:#00ff99;
border:none;
border-radius:10px;
cursor:pointer;
}

.msg{
margin-top:10px;
color:#00ffcc;
}
</style>
</head>

<body>

<div class="box">
<h2>🔑 Login / Register</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<div class="msg" id="msg"></div>
</div>

<script>

const API = "https://website-kiemtien.onrender.com";

// ===== LOGIN =====
function login(){
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

fetch(API + "/login", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({username,password})
})
.then(res=>res.json())
.then(data=>{
if(data.message === "OK"){
localStorage.setItem("user", username);
document.getElementById("msg").innerText = "✅ Đăng nhập thành công";

setTimeout(()=>{
location.href="dashboard.html";
},1000);

}else{
document.getElementById("msg").innerText = "❌ Sai tài khoản";
}
})
.catch(()=>{
document.getElementById("msg").innerText = "❌ Lỗi server";
});
}

// ===== REGISTER =====
function register(){
let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

fetch(API + "/register", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({username,password})
})
.then(res=>res.text())
.then(msg=>{
document.getElementById("msg").innerText = msg;
})
.catch(()=>{
document.getElementById("msg").innerText = "❌ Lỗi server";
});
}

</script>

</body>
</html>
