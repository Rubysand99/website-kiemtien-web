<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kiếm Point</title>

<style>
body {
  text-align:center;
  background:#0f172a;
  color:white;
  font-family: Arial;
}

button {
  padding: 12px 20px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.btn1 { background:#3b82f6; }
.btn2 { background:#22c55e; }

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  display:inline-block;
}
</style>
</head>

<body>

<div class="card">
<h1>💰 Kiếm Point</h1>

<button class="btn1" onclick="go('linkvertise')">
🔗 Linkvertise (1 point/lần)
</button>

<br><br>

<button class="btn2" onclick="go('funklink')">
💎 Funklink (2 point/lần)
</button>

<hr style="margin:30px;">

<h3>📜 Quy định</h3>

<p>
❌ Không dùng VPN / Proxy<br>
❌ Không spam / auto tool<br>
❌ Không reload spam (F5)<br><br>

✅ 3 lần / ngày / link<br>
⏱ 60s mỗi lần<br>
🎯 Phải hoàn thành quảng cáo
</p>

<hr style="margin:30px;">

<p style="opacity:0.6;">
Created by <b>rubynek209</b>
</p>

</div>

<script>

// ================= LINK LIST =================

// 🔗 Linkvertise list
const linkvertiseLinks = [
  "https://linkvertise.com/abc1",
  "https://linkvertise.com/abc2",
  "https://linkvertise.com/abc3",
  "https://linkvertise.com/abc4"
];

// 💎 Funklink list
const funklinkLinks = [
  "https://funklink.io/xyz1",
  "https://funklink.io/xyz2"
];

// ================= RANDOM FUNCTION =================

function getRandom(list){
  return list[Math.floor(Math.random() * list.length)];
}

// ================= ANTI SPAM =================

function canGo(){
  let last = localStorage.getItem("lastTime");

  if(!last) return true;

  let now = Date.now();

  if(now - last < 60000){
    alert("⏱ Vui lòng đợi 60 giây");
    return false;
  }

  localStorage.setItem("lastTime", now);
  return true;
}

// ================= MAIN =================

function go(type){

  if(!canGo()) return;

  localStorage.setItem("type", type);

  if(type === "funklink"){
    window.location.href = getRandom(funklinkLinks);
  } else {
    window.location.href = getRandom(linkvertiseLinks);
  }
}

</script>

</body>
</html>
