<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Kiếm Point</title>
</head>

<body style="text-align:center; background:#0f172a; color:white;">

<h1>💰 Kiếm Point</h1>

<button onclick="go('linkvertise')">
🔗 Linkvertise (1 point/lần)
</button>

<br><br>

<button onclick="go('funklink')">
💎 Funklink (2 point/lần)
</button>

<script>
function go(type){
  localStorage.setItem("type", type);

  if(type === "funklink"){
    window.location.href = "https://funklink.io/YOUR_LINK";
  } else {
    window.location.href = "https://linkvertise.com/YOUR_LINK";
  }
}
</script>

</body>
</html>
