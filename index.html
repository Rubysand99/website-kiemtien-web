<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPoint</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}
.menu-btn{
position:fixed;
top:15px;
left:15px;
font-size:30px;
cursor:pointer;
color:#00ffcc;
z-index:1000;
}

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
z-index:999;
}

.menu.active{
left:0;
}
/* navbar */
.navbar{
position:fixed;
top:0;
width:100%;
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
}

.navbar a{
color:white;
margin:0 10px;
text-decoration:none;
}

.navbar .right{
margin-right:10px;
}

/* content */
.container{
padding-top:120px;
}

.title{
font-size:32px;
color:#00ffcc;
}

button{
margin-top:20px;
padding:15px 30px;
background:#00ff99;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.online{
margin-top:10px;
color:#00ffcc;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<h3>Menu</h3>
<a href="login.html">🔑 Login</a>
<a href="dashboard.html">📊 Dashboard</a>
</div>
<!-- NAVBAR -->
<div class="navbar">
<div>
<a href="#">🏠 Home</a>
<a href="dashboard.html">📊 Dashboard</a>
</div>

<div class="right" id="auth">
<a href="login.html">🔑 Login</a>
</div>
</div>

<!-- CONTENT -->
<div class="container">
<div class="title">🎮 Earn Point System</div>

<p>Vượt link để nhận point</p>

<p class="online">🟢 <span id="online"></span> người đang online</p>

<button onclick="goLink(1)">💰 LINK 1</button>
<button onclick="goLink(2)">💰 LINK 2</button>
</div>

<script>

// fake online
document.getElementById("online").innerText =
10 + Math.floor(Math.random()*30);

// hiển thị user nếu đã login
let user = localStorage.getItem("user");

if(user){
document.getElementById("auth").innerHTML =
`👤 ${user} | <a href="#" onclick="logout()">Logout</a>`;
}

function logout(){
localStorage.removeItem("user");
location.reload();
}

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}
  
function goLink(id){
if(!user){
alert("Bạn cần đăng nhập!");
location.href="login.html";
return;
}

localStorage.setItem("verify_token", Date.now());
localStorage.setItem("link_id", id);

// link rút gọn
window.location.href = "https://link-target.net/1359000/VoDwwubZO94C";
}

</script>

</body>
</html>
