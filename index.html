<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>EarnPoint</title>

<!-- Minecraft pixel font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Press Start 2P', cursive;
  background: linear-gradient(180deg, #0b1f0b, #020403);
  color:#a3ff12;
  text-align:center;
  overflow-x:hidden;
}

/* pixel background animation */
body::before{
  content:"";
  position:fixed;
  width:300%;
  height:300%;
  background:
    repeating-linear-gradient(
      45deg,
      #0f2a0f 0px,
      #0f2a0f 10px,
      #0b1f0b 10px,
      #0b1f0b 20px
    );
  animation: move 15s linear infinite;
  opacity:0.2;
  z-index:-1;
}

@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(-200px,-200px)}
}

/* title */
h1{
  margin-top:40px;
  font-size:22px;
  text-shadow:0 0 10px #39ff14, 0 0 20px #00ff00;
}

/* button */
.btn{
  background:#14532d;
  border:3px solid #22c55e;
  padding:15px;
  margin:15px;
  border-radius:5px;
  color:#a3ff12;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 0 10px #22c55e;
}

.btn:hover{
  background:#166534;
  transform:scale(1.1);
  box-shadow:0 0 20px #22c55e, 0 0 40px #22c55e;
}

/* card */
.card{
  background:#020403;
  padding:20px;
  margin:25px auto;
  width:85%;
  max-width:420px;
  border:3px solid #22c55e;
  border-radius:10px;
  box-shadow:0 0 20px #22c55e;
  animation: fadeIn 0.8s ease;
  position:relative;
}

/* pixel corner effect */
.card::before{
  content:"";
  position:absolute;
  top:-5px;
  left:-5px;
  width:100%;
  height:100%;
  border:2px dashed #22c55e;
  opacity:0.3;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* popup */
.popup{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#020403;
  padding:15px;
  border:2px solid #22c55e;
  border-radius:5px;
  box-shadow:0 0 10px #22c55e;
  display:none;
  font-size:10px;
}

/* footer */
footer{
  margin-top:20px;
  opacity:0.6;
  font-size:10px;
}

/* glowing text animation */
.glow{
  animation: glow 1.5s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #22c55e; }
  to{ text-shadow:0 0 20px #00ff00; }
}
</style>
</head>

<body>

<h1 class="glow">⛏️ EarnPoint</h1>

<div class="card">
  <h2>⚡ Kiếm Point</h2>

  <button class="btn" onclick="go()">
    🔗 Linkvertise (1 point/lần)
  </button>
</div>

<div class="card">
  <h3>📜 Luật</h3>
  <p>
    ❌ Không dùng VPN / Proxy<br>
    ❌ Không spam<br>
    ❌ Không dùng tool auto<br><br>

    ✅ 1 ngày tối đa 3 lần / link<br>
    ⏱ Chờ 60 giây mỗi lần
  </p>
</div>

<footer>
  Created by <b>rubynek209</b>
</footer>

<div class="popup" id="popup">
  💸 Tip: Farm đủ 3 lần/ngày để max point!
</div>

<script>
// random link
const links = [
  "https://link-hub.net/1359000/ChMZK0YdY8qY",
  "https://direct-link.net/1359000/2jbBbud5kM1U",
  "https://lootdest.org/s?eCkVFdSB"
];

function go(){
  let link = links[Math.floor(Math.random()*links.length)];
  window.location.href = link;
}

// popup random
setTimeout(()=>{
  document.getElementById("popup").style.display="block";
},3000);

// anti F5 spam
if(localStorage.getItem("last") && Date.now() - localStorage.getItem("last") < 3000){
  alert("🚫 Đừng spam reload");
}
localStorage.setItem("last", Date.now());

</script>

</body>
</html>
