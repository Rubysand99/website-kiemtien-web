<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>EarnPoint</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Press Start 2P', cursive;
  color:#a3ff12;
  text-align:center;
  overflow:hidden;
  background:#020403;
}

/* DARK SKY */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, #0f172a 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #020617 0%, transparent 40%),
    #020403;
  z-index:-3;
}

/* pixel stars */
body::after{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background-image:
    radial-gradient(#22c55e 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveStars 60s linear infinite;
  opacity:0.2;
  z-index:-2;
}

@keyframes moveStars{
  from{transform:translate(0,0)}
  to{transform:translate(-200px,-200px)}
}

/* floating blocks */
.blocks{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.block{
  position:absolute;
  width:40px;
  height:40px;
  background:#1f2937;
  border:3px solid #22c55e;
  box-shadow:0 0 10px #22c55e;
  animation: float 6s infinite ease-in-out;
}

.block:nth-child(1){ top:20%; left:10%; animation-delay:0s;}
.block:nth-child(2){ top:50%; left:80%; animation-delay:2s;}
.block:nth-child(3){ top:70%; left:30%; animation-delay:4s;}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}

/* title */
h1{
  margin-top:40px;
  font-size:20px;
  text-shadow:0 0 10px #39ff14;
}

/* card */
.card{
  background:#020403;
  padding:20px;
  margin:25px auto;
  width:85%;
  max-width:420px;
  border:3px solid #22c55e;
  border-radius:10px;
  box-shadow:0 0 20px #22c55e;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* button */
.btn{
  background:#14532d;
  border:3px solid #22c55e;
  padding:15px;
  margin:15px;
  border-radius:5px;
  color:#a3ff12;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:#166534;
  transform:scale(1.1);
  box-shadow:0 0 20px #22c55e;
}

/* popup */
.popup{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#020403;
  padding:15px;
  border:2px solid #22c55e;
  border-radius:5px;
  box-shadow:0 0 10px #22c55e;
  display:none;
  font-size:10px;
}

/* SOCIAL */
.social-btn{
  display:block;
  margin:15px auto;
  padding:12px;
  width:80%;
  max-width:300px;
  text-decoration:none;
  color:white;
  border-radius:8px;
  font-size:11px;
  transition:0.3s;
}

.yt{
  background:#ff0000;
  box-shadow:0 0 10px #ff0000;
}

.tt{
  background:#111;
  box-shadow:0 0 10px #00f2ea;
}

.dc{
  background:#5865F2;
  box-shadow:0 0 10px #5865F2;
}

.social-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px white;
}
</style>
</head>

<body>

<div class="blocks">
  <div class="block"></div>
  <div class="block"></div>
  <div class="block"></div>
</div>

<h1>⛏️ EarnPoint</h1>

<div class="card">
  <h2>⚡ Kiếm Point</h2>

  <button class="btn" onclick="go()">
    🔗 Linkvertise (1 point/lần)
  </button>
</div>

<div class="card">
  <h3>📜 Luật</h3>
  <p>
    ❌ Không dùng VPN / Proxy<br>
    ❌ Không spam<br>
    ❌ Không dùng tool auto<br><br>

    ✅ 1 ngày tối đa 3 lần / link<br>
    ⏱ Chờ 60 giây mỗi lần
  </p>
</div>

<div class="card">
  <h3>🌐 Community</h3>

  <a href="https://www.youtube.com/@Rubyne_36rauma" target="_blank" class="social-btn yt">
    ▶ YouTube
  </a>

  <a href="https://www.tiktok.com/@tuytam156?_r=1&_t=ZS-95DvMf379s4" target="_blank" class="social-btn tt">
    🎵 TikTok
  </a>

  <a href="https://discord.gg/FkC45DwtyN" target="_blank" class="social-btn dc">
    💬 Discord
  </a>
</div>

<div class="popup" id="popup">
  💸 Tip: Farm đủ 3 lần/ngày để max point!
</div>

<script>
// random link
const links = [
  "https://link-hub.net/1359000/ChMZK0YdY8qY",
  "https://direct-link.net/1359000/2jbBbud5kM1U",
  "https://lootdest.org/s?eCkVFdSB"
];

function go(){
  let link = links[Math.floor(Math.random()*links.length)];
  window.location.href = link;
}

// popup
setTimeout(()=>{
  document.getElementById("popup").style.display="block";
},3000);

// ❌ không còn alert reload
localStorage.setItem("last", Date.now());
</script>

</body>
</html>
