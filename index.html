<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>EarnPoint</title>

<style>
body {
  text-align:center;
  background:#0f172a;
  color:white;
  font-family: Arial;
}
button{
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<h1>💰 EarnPoint</h1>

<h3 id="streak">🔥 Streak: 0</h3>
<p id="status"></p>

<button onclick="daily()">🎁 Điểm danh</button>

<hr>

<button onclick="go()">🔗 Vượt Link</button>

<script>
function go(){
  const links = [
    "https://link-hub.net/1359000/ChMZK0YdY8qY",
    "https://direct-link.net/1359000/2jbBbud5kM1U",
    "https://lootdest.org/s?eCkVFdSB"
  ];
  window.location.href = links[Math.floor(Math.random()*links.length)];
}

async function daily(){
  const status = document.getElementById("status");

  status.innerText = "⏳ Đang xử lý...";

  const res = await fetch("https://website-kiemtien.onrender.com/daily");
  const data = await res.json();

  if(data.status === "ok"){
    status.innerText = `+${data.reward} point`;
    document.getElementById("streak").innerText = "🔥 Streak: " + data.streak;
  }
  else if(data.status === "vpn_blocked"){
    status.innerText = "🚫 Không dùng VPN";
  }
  else{
    status.innerText = "⏱️ Đã nhận hôm nay";
  }
}
</script>

</body>
</html>
