<script>
let captchaToken = "";

// nhận captcha
function onCaptchaSuccess(token){
  captchaToken = token;
}

async function getCode(){

  const status = document.getElementById("status");

  // FIX userId (QUAN TRỌNG)
  let userId = localStorage.getItem("user");

  if (!userId) {
    userId = "user_" + Math.random().toString(36).substring(2, 12);
    localStorage.setItem("user", userId);
  }

  const fp = btoa(navigator.userAgent + screen.width + screen.height);
  const token = localStorage.getItem("token") || "";

  if(!captchaToken){
    status.innerText = "⏳ Đang xác minh captcha...";
    return;
  }

  status.innerText = "⏳ Đang xử lý...";

  try {

    const res = await fetch(
      "https://website-kiemtien.onrender.com/get-code?userId="
      + userId + "&token=" + token + "&fp=" + fp + "&captcha=" + captchaToken
    );

    const data = await res.json();

    if(data.token){
      localStorage.setItem("token", data.token);
    }

    if(data.status === "ok"){
      status.innerText = "🎁 Code: " + data.code;
    }
    else{
      status.innerText = "❌ " + data.status;
    }

  } catch (err) {
    status.innerText = "❌ Lỗi kết nối";
  }
}
</script>
