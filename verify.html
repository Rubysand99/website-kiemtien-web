<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify</title>
</head>

<body style="text-align:center; background:black; color:white; padding-top:100px;">

<h2 id="text">Đang kiểm tra...</h2>

<script>

// chống fake cơ bản
let token = localStorage.getItem("verify_token");
if(!token){
  document.getElementById("text").innerText = "❌ Bạn chưa vượt link!";
}else{

  fetch("https://website-kiemtien.onrender.com/verify", {
    method: "POST"
  })
  .then(res=>res.text())
  .then(code=>{
    document.getElementById("text").innerText = "🎁 Code của bạn: " + code;

    // xoá token để không spam
    localStorage.removeItem("verify_token");
  });

}

</script>

</body>
</html>
