<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nhận Code</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
body { text-align:center; background:#0f172a; color:white; }
.loader {
  border: 4px solid #1e293b;
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>

</head>

<body>

<h1>🎁 Nhận Code</h1>

<div class="cf-turnstile"
data-sitekey="0x4AAAAAACvsKfOXK7saRFTH"
data-callback="ok"></div>

<br>

<button onclick="getCode()">Lấy Code</button>

<div id="load" style="display:none;"><div class="loader"></div></div>

<p id="status"></p>

<script>
let captcha = "";

function ok(t){ captcha = t; }

if(!localStorage.getItem("user")){
  localStorage.setItem("user", "user_"+Math.random());
}

// ===== ANTI F5 =====
const now = Date.now();
const pass = localStorage.getItem("pass");

if(!pass){
  window.location.href = "index.html";
}

if(now - pass > 5*60*1000){
  localStorage.removeItem("pass");
  location.reload();
}

// ===== GET CODE =====
async function getCode(){

  const status = document.getElementById("status");
  const load = document.getElementById("load");

  if(!captcha){
    status.innerText = "⏳ Chờ captcha";
    return;
  }

  load.style.display="block";

  const user = localStorage.getItem("user");
  const type = localStorage.getItem("type") || "linkvertise";

  const res = await fetch(
    `https://website-kiemtien.onrender.com/get-code?userId=${user}&captcha=${captcha}&type=${type}`
  );

  const data = await res.json();

  load.style.display="none";

  if(data.status === "ok"){
    navigator.clipboard.writeText(data.code);
    status.innerText = `🎁 ${data.code} (+${data.reward} point)`;
  }
  else if(data.status === "limit"){
    status.innerText = "🚫 Hết lượt hôm nay";
  }
  else if(data.status === "cooldown"){
    status.innerText = "⏱️ Đợi 60s";
  }
  else if(data.status === "vpn_blocked"){
    status.innerText = "🚫 Không dùng VPN";
  }
  else{
    status.innerText = "❌ Lỗi";
  }
}
</script>

</body>
</html>
