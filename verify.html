<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify</title>
</head>

<body style="background:black;color:white;text-align:center;padding-top:100px;">

<h2 id="text">Đang kiểm tra...</h2>

<script>

let token = localStorage.getItem("verify_token");

if(!token){
  document.getElementById("text").innerText = "❌ Bạn chưa vượt link!";
}else{

  fetch("https://website-kiemtien.onrender.com/verify", {
    method: "POST"
  })
  .then(res=>res.text())
  .then(code=>{
    document.getElementById("text").innerText = "🎁 Code: " + code;

    localStorage.removeItem("verify_token");
  });

}

</script>

</body>
</html>
