<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nhận Code</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
body { text-align:center; background:#0f172a; color:white; font-family:sans-serif; }
.loader {
  border: 4px solid #1e293b;
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
  margin:auto;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
button { padding:10px 20px; margin-top:10px; cursor:pointer; background:#22c55e; border:none; color:white; border-radius:5px; }
button:hover { background:#16a34a; }
</style>

</head>

<body>

<h1>🎁 Nhận Code</h1>

<div class="cf-turnstile"
     data-sitekey="0x4AAAAAACvsKfOXK7saRFTH"
     data-callback="ok"></div>

<br>

<p style="color:#facc15;">
⚠️ Hoàn thành đầy đủ quảng cáo trước khi nhận code
</p>

<button onclick="getCode()">Lấy Code</button>

<div id="load" style="display:none;"><div class="loader"></div></div>

<p id="status"></p>

<script>
let captcha = "";

// Callback Turnstile
function ok(token){ captcha = token; }

// Tạo user nếu chưa có
if(!localStorage.getItem("user")){
  localStorage.setItem("user", "user_"+Math.random());
}

// ANTI F5
const now = Date.now();
const pass = localStorage.getItem("pass");

if(!pass){
  window.location.href = "index.html";
}

if(now - pass > 5*60*1000){
  localStorage.removeItem("pass");
  location.reload();
}

// GET CODE
async function getCode(){

  const status = document.getElementById("status");
  const load = document.getElementById("load");

  if(!captcha){
    status.innerText = "⏳ Chờ captcha";
    return;
  }

  load.style.display="block";
  status.innerText = "";

  const user = localStorage.getItem("user");
  const type = localStorage.getItem("type") || "linkvertise";

  try{
    const res = await fetch(
      `https://website-kiemtien.onrender.com/get-code?userId=${user}&captcha=${captcha}&type=${type}`
    );

    const text = await res.text();
    console.log("API response:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch(e){
      console.error("JSON parse error:", e);
      status.innerText = "❌ API trả về không phải JSON";
      load.style.display="none";
      return;
    }

    load.style.display="none";

    switch(data.status){
      case "ok":
        navigator.clipboard.writeText(data.code);
        status.innerText = `🎁 ${data.code} (+${data.reward} point)`;
        break;
      case "limit":
        status.innerText = "🚫 Hết lượt hôm nay";
        break;
      case "cooldown":
        status.innerText = "⏱️ Đợi 60s";
        break;
      case "vpn_blocked":
        status.innerText = "🚫 Không dùng VPN";
        break;
      case "captcha_fail":
        status.innerText = "⚠️ Captcha không hợp lệ, thử lại";
        break;
      default:
        status.innerText = "❌ Lỗi";
        break;
    }

  } catch(err){
    console.error("Fetch error:", err);
    load.style.display="none";
    status.innerText = "❌ Không thể kết nối server";
  }
}
</script>

</body>
</html>
