<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify</title>

<style>
body{
background:#000;
color:white;
text-align:center;
padding-top:100px;
font-family:Arial;
}
</style>

<body>

<h2>✅ Verify</h2>
<p id="msg">Đang xử lý...</p>

<script>

const API="https://website-kiemtien.onrender.com";

let user = localStorage.getItem("user");
let token = localStorage.getItem("verify_token");
let link_id = localStorage.getItem("link_id");

// check basic
if(!user || !token){
document.body.innerHTML="❌ Không hợp lệ";
}

// gửi request
fetch(API+"/reward",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user,
token:token,
link_id:link_id
})
})
.then(res=>res.json())
.then(data=>{

if(data.msg==="ok"){
msg.innerText="🎉 +1 point | Tổng: "+data.money;
}else if(data.msg==="limit"){
msg.innerText="❌ Hôm nay bạn đã vượt đủ 3 lần link này";
}else{
msg.innerText="Lỗi!";
}

localStorage.removeItem("verify_token");

});

</script>

</body>
</html>
