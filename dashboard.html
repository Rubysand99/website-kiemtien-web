<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
background:#111;
color:white;
text-align:center;
padding-top:100px;
font-family:Arial;
}
</style>

</head>

<body>

<h2>Dashboard</h2>

<p id="user"></p>

<script>

let u = localStorage.getItem("user");

if(u){
  document.getElementById("user").innerText = "User: " + u;
}else{
  document.getElementById("user").innerText = "Chưa đăng nhập";
}

</script>

</body>
</html>
