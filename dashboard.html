<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;padding-top:100px;">

<h2>🏆 Leaderboard</h2>
<pre id="top"></pre>

<script>
fetch("https://website-kiemtien.onrender.com/leaderboard")
.then(res=>res.json())
.then(data=>{
  let text = "";
  data.forEach((u,i)=>{
    text += (i+1)+". "+u.discordId+" - "+u.points+" point\n";
  });
  document.getElementById("top").innerText = text;
});
</script>

</body>
</html>
